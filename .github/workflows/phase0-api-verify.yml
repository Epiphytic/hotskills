name: Phase 0 API Smoke Tests

on:
  pull_request:
    branches: [main]

jobs:
  api-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run API smoke tests
        id: api-verify
        run: bash scripts/phase0-api-verify.sh | tee phase0-api-verify-output.json

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-api-verify-output
          path: phase0-api-verify-output.json
