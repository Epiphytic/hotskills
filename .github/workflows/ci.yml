name: CI

on:
  push:
    branches: [main, "brains/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Build
        run: npm run build
        working-directory: server

      - name: Type check
        run: npx tsc --noEmit
        working-directory: server

      - name: Test
        run: npm test
        working-directory: server

      - name: E2E (stdio)
        run: bash scripts/e2e.sh
