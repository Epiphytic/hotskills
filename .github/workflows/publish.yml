name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0). Leave blank to use server/package.json as-is."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm OIDC trusted-publisher support requires npm >= 11.5.1.
      # Node 22's bundled npm (10.9.x) doesn't, so install a known-good
      # version. `--force` works around npm/cli#7951 where the in-place
      # self-upgrade can leave the install missing transitive deps
      # (e.g. `Cannot find module 'promise-retry'`).
      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g --force npm@11
          npm --version

      - name: Resolve target version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            # RELEASE_TAG is e.g. "v0.1.1" or "0.1.1"
            VERSION="${RELEASE_TAG#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "No version resolved (no input and no release tag)" >&2
            exit 1
          fi
          # Allow only X.Y.Z[-prerelease][+build] to refuse anything weird.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.+-][0-9A-Za-z.-]+)?$'; then
            echo "Refusing to publish suspicious version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Sync package.json version if needed
        env:
          TARGET: ${{ steps.version.outputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$TARGET" ]; then
            echo "package.json version ($PKG_VERSION) != target ($TARGET); syncing."
            npm version "$TARGET" --no-git-tag-version --allow-same-version
          else
            echo "package.json version already matches: $PKG_VERSION"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Authenticated via npm OIDC trusted publisher (configured on
      # npmjs.com). No NPM_TOKEN secret required; the runner's OIDC
      # token is exchanged for short-lived publish credentials.
      # `id-token: write` permission (above) is what makes this work.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
